cluster:
  # Display name shown on the OpenSearch Doctor dashboard
  name: "My Production Cluster"
  # OpenSearch endpoint (include port)
  endpoint: "https://localhost:9200"
  # Environment tag: production | staging | development | custom
  environment: "production"

  # Authentication — use username+password OR api_key (not both)
  username: "admin"
  password: "your-password"
  # api_key: "your-opensearch-api-key"

  # TLS options
  tls_skip_verify: false
  # ca_cert_path: "/path/to/ca.pem"

saas:
  # SaaS API URL (default: https://opensearchdoctor.com)
  api_url: "https://opensearchdoctor.com"
  # API key from the OpenSearch Doctor dashboard (Settings → Agent Keys)
  api_key: "osd_your_key_here"

agent:
  # How often to run diagnostics (minutes). Default: 360 (6 hours)
  interval_minutes: 360
  # How often to send heartbeat (seconds). Default: 300 (5 min)
  heartbeat_seconds: 300
  # Log file path. Default: agent.log (same directory as binary)
  log_file: "agent.log"
  # Leave empty to enable all categories, or list specific ones:
  # enabled_categories:
  #   - cluster_health
  #   - nodes
  #   - shards
